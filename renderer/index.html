<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대구대학교 스마트 LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ===== 커스텀 타이틀바 ===== -->
  <header id="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-icon">🎓</span>
      <span class="titlebar-text">대구대학교 스마트 LMS</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-minimize" class="tb-btn" aria-label="최소화">─</button>
      <button id="btn-maximize" class="tb-btn" aria-label="최대화">☐</button>
      <button id="btn-close" class="tb-btn close" aria-label="닫기">✕</button>
    </div>
  </header>

  <!-- ===== 로그인 뷰 ===== -->
  <section id="login-view" class="view active">
    <div class="login-bg">
      <div class="bg-orb orb-1"></div>
      <div class="bg-orb orb-2"></div>
      <div class="bg-orb orb-3"></div>
    </div>

    <div class="login-card glass">
      <div class="login-logo">
        <div class="logo-circle">
          <span>LMS</span>
        </div>
        <h1>통합 LMS 크롤러</h1>
        <p class="login-subtitle">여러 대학의 학습 데이터를 한 곳에서</p>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="login-univ">소속 학교</label>
          <div class="input-wrapper" style="position:relative;">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
            <select id="login-univ"
              style="width: 100%; padding: 12px 16px 12px 42px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 14px; appearance: none; outline: none; transition: var(--transition);">
              <option value="daegu" style="background:#1a1f2e;">대구대학교 (Daegu. Univ)</option>
              <option value="hello" style="background:#1a1f2e;">(테스트) Hello LMS (기본형)</option>
              <option value="knu" style="background:#1a1f2e;">경북대학교 (KNU)</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label for="login-id">학번</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" id="login-id" placeholder="학번을 입력하세요" required>
          </div>
        </div>

        <div class="input-group">
          <label for="login-pw">비밀번호</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" required>
          </div>
        </div>

        <button type="submit" id="login-btn" class="btn-primary">
          <span class="btn-text">로그인</span>
          <div class="btn-loader" style="display:none;">
            <div class="spinner"></div>
          </div>
        </button>
      </form>

      <div id="login-status" class="status-msg"></div>
      <p class="login-hint">🔐 로그인 후 2차 인증을 완료해 주세요</p>
    </div>
  </section>

  <!-- ===== 대시보드 뷰 ===== -->
  <section id="dashboard-view" class="view">
    <!-- 상단 프로필 바 -->
    <div class="dash-header glass">
      <div class="profile-area">
        <div class="profile-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
        <div class="profile-text">
          <h2 id="profile-name">사용자</h2>
          <span id="profile-dept" class="profile-sub"></span>
        </div>
      </div>
      <div class="header-actions">
        <div id="crawl-status" class="crawl-badge">
          <div class="pulse-dot"></div>
          <span>크롤링 준비</span>
        </div>
      </div>
    </div>

    <!-- 진행 상황 -->
    <div id="progress-section" class="progress-section">
      <div class="progress-bar-track">
        <div id="progress-bar" class="progress-bar-fill"></div>
      </div>
      <p id="progress-text" class="progress-text">대기 중...</p>
    </div>

    <!-- 사용자 정보 카드 -->
    <div id="user-info-section" class="info-section" style="display:none;">
      <h3 class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        사용자 정보
      </h3>
      <div id="user-info-grid" class="info-grid"></div>
    </div>

    <!-- 과목 카드 그리드 -->
    <div id="courses-section" class="courses-section" style="display:none;">
      <h3 class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
        수강 과목
        <span id="course-count" class="badge">0</span>
      </h3>
      <div id="course-grid" class="course-grid"></div>
    </div>
  </section>

  <!-- ===== 과목 상세 모달 ===== -->
  <div id="course-modal" class="modal-overlay">
    <div class="modal glass">
      <div class="modal-header">
        <h2 id="modal-title">과목명</h2>
        <button id="modal-close" class="modal-close-btn">&times;</button>
      </div>

      <div class="modal-tabs">
        <button class="tab active" data-tab="plan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          강의계획서
        </button>
        <button class="tab" data-tab="notices">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          공지사항
        </button>
        <button class="tab" data-tab="qna">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
          질의응답
        </button>
        <button class="tab" data-tab="materials">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
          </svg>
          강의자료
        </button>
        <button class="tab" data-tab="projects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          팀프로젝트
        </button>
        <button class="tab" data-tab="tests">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
          시험/퀴즈
        </button>
        <button class="tab" data-tab="discuss">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
          토론
        </button>
        <button class="tab" data-tab="clicker">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <polygon points="12 2 2 7 12 12 22 7 12 2" />
            <polyline points="2 12 12 17 22 12" />
            <polyline points="2 17 12 22 22 17" />
          </svg>
          투표
        </button>
        <button class="tab" data-tab="survey">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="12" y1="8" x2="12" y2="16" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
          설문
        </button>
      </div>

      <div id="modal-body" class="modal-body">
        <div class="empty-state">데이터를 불러오는 중...</div>
      </div>
    </div>
  </div>

  <!-- ===== 공지/과제 등 상세 모달 ===== -->
  <div id="detail-modal" class="modal-overlay" style="display: none; z-index: 6000;">
    <div class="modal glass" style="max-width: 800px;">
      <div class="modal-header">
        <h2 id="detail-title">상세 내용</h2>
        <button id="detail-close" class="modal-close-btn">&times;</button>
      </div>

      <div id="detail-body" class="modal-body"
        style="background:#f9f9f9; color:#333; padding:20px; border-radius: 0 0 16px 16px; min-height:300px; max-height:600px; overflow-y:auto;">
        <div id="detail-loading" style="text-align:center; padding:40px;">
          <div class="spinner border-spinner" style="border-color:#333; border-right-color:transparent;"></div>
          <p style="margin-top:20px; color:#555;">내용을 불러오는 중...</p>
        </div>
        <div id="detail-content" style="display:none; line-height: 1.6;"></div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
